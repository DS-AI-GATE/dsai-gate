name: Deploy syllabus explorer

on:
  pull_request:
    paths:
      - "webapp/**"
      - "*-Readme.md"
      - "Topic_Resources/**"
      - "notebooks/**"
      - "Interview/**"
      - "PYQ/**"
      - "README.md"
      - "docs/webapp.md"
      - ".github/workflows/pages.yml"
  push:
    branches:
      - main
    paths:
      - "webapp/**"
      - "*-Readme.md"
      - "Topic_Resources/**"
      - "notebooks/**"
      - "Interview/**"
      - "PYQ/**"
      - "README.md"
      - "docs/webapp.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: webapp/requirements.txt

      - name: Install webapp dependencies
        run: pip install -r webapp/requirements.txt

      - name: Test Flask app and renderer
        run: python -m unittest webapp.tests

      - name: Export static site
        run: python -m webapp.build --output _site

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
